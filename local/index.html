        <title>Overhype Phaser 3 Framework</title>
        <style>
            /* Растягиваем html и body на 100% экрана и убираем любые прокрутки */

                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                overflow: hidden;
                background: url(/assets/images/bg.jpg) no-repeat; /* Исправлен путь */
                background-position: center;
                background-size: cover; /* Чтобы фон плавно растягивался под экран */

            /* Растягиваем контейнер игры, чтобы Phaser видел реальные границы */
            #phaser_div {
                width: 100%;
                height: 100%;
            }
